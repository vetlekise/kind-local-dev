apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: projects.my.platform.io
  annotations:
    kustomize.toolkit.fluxcd.io/ssa: Merge
spec:
  group: my.platform.io
  scope: Namespaced
  names:
    kind: Project
    plural: projects
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                location:
                  type: string
                  default: norwayeast
                environments:
                  type: array
                  items:
                    type: string
              required:
                - location